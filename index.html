<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo</title>
    <link rel="shortcut icon" href="assets/imgs/Alucard.gif" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="tabelas" id="pulos_quantidade">
        Pulos: 0
    </div>
    <div class="tabelas" id="inimigos_quantidade">
        Inimigos derrotados: 0
    </div>
    <div class="game-board">
        <img src="assets/imgs/Morcego.gif" class="morcego">
        <img src="assets/imgs/Morcego.gif" class="morcego2">
        <img src="assets/imgs/Alucard.gif" class="alucard">
        <img src="assets/imgs/Zumbis.webp" class="zumbi"> 
    </div>

    <div class="controles">
        <button class="butao_pulo">PULAR</button>
        <button class="butao_ataque">ATACAR</button>
    </div>

    <div class="game-over">
        <button class="restart">REINICIAR</button>
    </div>
</body>
</html>
